// Example fragment for Tinode FCM push configuration.
// Do not put real Firebase JSON or credentials in this file.
// Keep Android data-only notifications for NightVex so notification taps
// are routed by the app to the correct direct chat or group topic.
{
  "push": [
    {
      "name": "fcm",
      "config": {
        "enabled": true,
        "project_id": "replace-with-firebase-project-id",
        "credentials_file": "/opt/nightvex/secrets/firebase-service-account.json",
        "time_to_live": 3600,
        "android": {
          "enabled": false,
          "click_action": ".MessageActivity",
          "icon": "ic_icon_push",
          "color": "#2F6BFF"
        }
      }
    }
  ]
}
